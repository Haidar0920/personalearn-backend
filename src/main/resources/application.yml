spring:
  application:
    name: personalearn

  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

  security:
    oauth2:
      resourceserver:
        jwt:
          # Supabase JWT is HS256 — decoder is configured in SupabaseJwtConfig.java
          # issuer-uri is NOT used for HS256, but kept for reference
          issuer-uri: ${SUPABASE_URL}/auth/v1

server:
  servlet:
    context-path: '/api-persona-learn/'
  port: ${PORT:8080}
  address: 0.0.0.0

supabase:
  url: ${SUPABASE_URL}
  anon-key: ${SUPABASE_ANON_KEY}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
  jwt:
    secret: ${SUPABASE_JWT_SECRET}

anthropic:
  api-key: ${ANTHROPIC_API_KEY}
  model: claude-3-5-haiku-20241022

jwt:
  auth:
    converter:
      principle-attribute: sub

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics
